<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
  <title>Group Tabs – Export & Restore</title>
</head>

<body>
  <header class="app-header">
    <img class="app-logo" src="icons/icon-32.png" alt="" width="28" height="28" />
    <div class="app-title">
      <h1>Tab Groups</h1>
      <p id="summary" class="app-sub">…</p>
    </div>
  </header>

  <main class="content">
    <section class="section">
      <h2 class="label">Export</h2>
      <div class="actions">
        <button id="exportFile" class="btn btn-primary">Download</button>
        <button id="exportCopy" class="btn btn-ghost">Copy</button>
      </div>
      <div class="options">
        <label class="switch">
          <span class="switch-text">
            <span class="switch-label">Include ungrouped tabs</span>
            <span class="switch-help">Also export tabs that aren't in any group</span>
          </span>
          <input type="checkbox" id="optUngrouped" class="toggle-input" />
          <span class="toggle" aria-hidden="true"></span>
        </label>
      </div>
    </section>

    <div class="divider"></div>

    <section class="section">
      <h2 class="label">Import</h2>

      <label class="dropzone" id="dropzone" for="importFile">
        <svg class="dz-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 16V4" />
          <path d="m7 9 5-5 5 5" />
          <path d="M5 20h14" />
        </svg>
        <span class="dz-title">Choose a file</span>
        <span class="dz-sub">or drop a .json export here</span>
        <input type="file" id="importFile" accept="application/json,.json" hidden />
      </label>

      <details class="paste">
        <summary>Paste JSON instead</summary>
        <textarea id="importText" placeholder="Paste exported JSON here"></textarea>
        <button id="importTextBtn" class="btn btn-ghost btn-wide">Import from text</button>
      </details>

      <div class="options">
        <label class="switch">
          <span class="switch-text">
            <span class="switch-label">Open in a new window</span>
            <span class="switch-help">Keeps your current tabs untouched</span>
          </span>
          <input type="checkbox" id="optNewWindow" class="toggle-input" checked />
          <span class="toggle" aria-hidden="true"></span>
        </label>
        <label class="switch">
          <span class="switch-text">
            <span class="switch-label">Load tabs lazily</span>
            <span class="switch-help">Best for large imports</span>
          </span>
          <input type="checkbox" id="optLazy" class="toggle-input" checked />
          <span class="toggle" aria-hidden="true"></span>
        </label>
      </div>

    </section>
  </main>

  <p id="status" class="status" role="status" aria-live="polite"></p>

  <div class="support">
    <a href="https://ko-fi.com/Q8G623M9RJ" target="_blank" rel="noopener">
      <img height="30" style="border:0;height:30px;" src="https://storage.ko-fi.com/cdn/kofi2.png?v=6" alt="Buy Me a Coffee at ko-fi.com" />
    </a>
  </div>

  <script src="popup.js"></script>
</body>

</html>
