<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Suspended tab</title>
  <style>
    :root {
      --fg: #1c1c1e;
      --muted: #6e6e73;
      --accent: #4f46e5;
      --accent-press: #4338ca;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #ffffff;
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 520px;
      text-align: center;
    }
    .mark {
      width: 56px;
      height: 56px;
      margin: 0 auto 18px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.2);
    }
    .mark img { width: 100%; height: 100%; display: block; }
    h1 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.01em;
      word-break: break-word;
    }
    .url {
      margin: 0 0 22px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      word-break: break-all;
    }
    button {
      appearance: none;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 24px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: var(--accent-press); }
    .tip { margin: 14px 0 0; font-size: 12px; color: #9a9aa0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark"><img src="icons/icon-48.png" alt="" /></div>
    <h1 id="title">Loading…</h1>
    <div class="url" id="url"></div>
    <button id="restore">Load page</button>
    <p class="tip">Opens automatically when you view this tab.</p>
  </div>
  <script src="suspended.js"></script>
</body>
</html>
